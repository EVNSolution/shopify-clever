<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">clever app icon</title>
  <desc id="desc">A green local-delivery route mark with three stops and a centered clever wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#073B2B"/>
      <stop offset="0.56" stop-color="#0B7A53"/>
      <stop offset="1" stop-color="#3DDC97"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2FFF8"/>
      <stop offset="1" stop-color="#B8FFD8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#032418" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="965" cy="185" r="160" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="205" cy="970" r="210" fill="#FFFFFF" opacity="0.07"/>

  <g filter="url(#softShadow)">
    <path d="M324 756 C 446 620, 546 666, 612 516 S 797 318, 909 438" fill="none" stroke="url(#route)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M324 756 C 446 620, 546 666, 612 516 S 797 318, 909 438" fill="none" stroke="#07402D" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.42"/>

    <g>
      <circle cx="324" cy="756" r="86" fill="#F7FFF9"/>
      <circle cx="324" cy="756" r="36" fill="#0B7A53"/>
    </g>
    <g>
      <circle cx="612" cy="516" r="86" fill="#F7FFF9"/>
      <circle cx="612" cy="516" r="36" fill="#0B7A53"/>
    </g>
    <g>
      <circle cx="909" cy="438" r="86" fill="#F7FFF9"/>
      <circle cx="909" cy="438" r="36" fill="#0B7A53"/>
    </g>
  </g>

  <g transform="translate(0 40)">
    <text x="600" y="914" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif" font-size="178" font-weight="800" letter-spacing="-10" fill="#FFFFFF">clever</text>
    <text x="600" y="990" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'SF Pro Text', Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="9" fill="#DFFFF0" opacity="0.92">LOCAL ROUTES</text>
  </g>
</svg>
