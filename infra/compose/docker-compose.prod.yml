services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - shopify-app
      - delivery-api
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  shopify-app:
    build:
      context: ../../apps/shopify-app
      dockerfile: Dockerfile
    image: shopify-clever-shopify-app:local
    env_file:
      - ../env/shopify-app.env
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_APP_DISTRIBUTION: app_store
      SHOPIFY_APP_URL: https://clever-admin.cleversystem.ai
      CLEVER_DELIVERY_API_URL: http://delivery-api:3000
    restart: unless-stopped
    volumes:
      - /srv/shopify-clever/data/shopify/dev.sqlite:/app/prisma/dev.sqlite

  delivery-api:
    build:
      context: ../../apps/delivery-api
      dockerfile: Dockerfile
    image: shopify-clever-delivery-api:local
    depends_on:
      postgres:
        condition: service_healthy
      delivery-api-migrate:
        condition: service_completed_successfully
    env_file:
      - ../env/delivery-api.env
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_APP_URL: https://clever-admin.cleversystem.ai
    restart: unless-stopped

  delivery-api-migrate:
    build:
      context: ../../apps/delivery-api
      dockerfile: Dockerfile
      target: build
    image: shopify-clever-delivery-api-migrate:local
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../env/delivery-api.env
    command: ["npm", "exec", "--", "prisma", "db", "push", "--skip-generate"]
    restart: "no"

  postgres:
    image: postgres:17-bookworm
    env_file:
      - ../env/delivery-api.env
    environment:
      POSTGRES_DB: clever_delivery
      POSTGRES_USER: clever
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clever -d clever_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - /mnt/clever-delivery-postgres/data:/var/lib/postgresql/data
      - /mnt/clever-delivery-postgres/backups:/backups

volumes:
  caddy-data:
  caddy-config:
