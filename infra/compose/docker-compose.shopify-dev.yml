name: shopify-clever-dev

services:
  clever-route-app-dev:
    build:
      context: ../../apps/shopify-app
      dockerfile: Dockerfile
    image: shopify-clever-dev-clever-route-app-dev:local
    env_file:
      - ../env/shopify-app-clever-route.env
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_APP_URL: https://clever-route-app-dev.cleversystem.ai
      CLEVER_DELIVERY_API_URL: http://clever-route-api:3000
      CLEVER_APP_ID: clever-route-dev
      GEOCODING_SEARCH_URL: https://nominatim.openstreetmap.org/search
    restart: unless-stopped
    volumes:
      - /srv/shopify-clever-dev/data/shopify/dev.sqlite:/app/prisma/dev.sqlite
    networks:
      route-server:
        aliases:
          - shopify-app-clever-route

networks:
  route-server:
    external: true
    name: ${ROUTE_SERVER_NETWORK:-clever-route_default}
