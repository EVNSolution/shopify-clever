name: Temp Shopify orders pagination hotfix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hotfix:
    name: Patch Shopify app order pagination on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      EC2_SSH_SECURITY_GROUP_ID: ${{ vars.EC2_SSH_SECURITY_GROUP_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$DEPLOY_PATH"
          test -n "$EC2_SSH_KEY"
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$EC2_SSH_SECURITY_GROUP_ID"

      - name: Temporarily allow this runner to SSH to EC2
        id: ssh_ingress
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          runner_cidr="$runner_ip/32"
          echo "runner_cidr=$runner_cidr" >> "$GITHUB_OUTPUT"
          if aws ec2 authorize-security-group-ingress --group-id "$EC2_SSH_SECURITY_GROUP_ID" --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$runner_cidr,Description=shopify-orders-pagination-hotfix}]"; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            if aws ec2 describe-security-groups --group-ids "$EC2_SSH_SECURITY_GROUP_ID" --query "SecurityGroups[0].IpPermissions[?FromPort==`22` && ToPort==`22`].IpRanges[].CidrIp" --output text | tr "\t" "\n" | grep -Fxq "$runner_cidr"; then
              echo "authorized=false" >> "$GITHUB_OUTPUT"
            else
              exit 1
            fi
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for attempt in 1 2 3; do
            if ssh-keyscan -4 -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          exit 1

      - name: Patch Shopify app source and restart service
        run: |
          set -euo pipefail
          cat > /tmp/shopify-orders.server.js.b64 <<'EOF_SHOPIFY_ORDERS'
          
          EOF_SHOPIFY_ORDERS
          cat > /tmp/delivery-labels.js.b64 <<'EOF_DELIVERY_LABELS'
          
          EOF_DELIVERY_LABELS
          base64 -d /tmp/shopify-orders.server.js.b64 > /tmp/shopify-orders.server.js
          base64 -d /tmp/delivery-labels.js.b64 > /tmp/delivery-labels.js
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes /tmp/shopify-orders.server.js /tmp/delivery-labels.js "$EC2_USER@$EC2_HOST:/tmp/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            ts=\$(date -u +%Y%m%dT%H%M%SZ)
            cp apps/shopify-app/app/features/orders/shopify-orders.server.js /tmp/shopify-orders.server.js.before-\$ts
            cp apps/shopify-app/app/features/delivery/delivery-labels.js /tmp/delivery-labels.js.before-\$ts
            install -m 644 /tmp/shopify-orders.server.js apps/shopify-app/app/features/orders/shopify-orders.server.js
            install -m 644 /tmp/delivery-labels.js apps/shopify-app/app/features/delivery/delivery-labels.js
            grep -q 'SHOPIFY_ORDERS_MAX_PAGES' apps/shopify-app/app/features/orders/shopify-orders.server.js
            grep -q 'pageInfo' apps/shopify-app/app/features/orders/shopify-orders.server.js
            grep -q 'normalizeExplicitDeliveryDate' apps/shopify-app/app/features/delivery/delivery-labels.js
            docker compose -f infra/compose/docker-compose.prod.yml build shopify-app
            docker compose -f infra/compose/docker-compose.prod.yml up -d shopify-app
            docker compose -f infra/compose/docker-compose.prod.yml ps shopify-app
            rm -f /tmp/shopify-orders.server.js /tmp/delivery-labels.js
          "

      - name: Smoke test production app endpoint
        run: |
          set -euo pipefail
          admin_body="$(mktemp)"
          test "$(curl -sS -L -o "$admin_body" -w '%{http_code}' https://clever-admin.3-39-216-177.sslip.io/auth/login)" = "200"
          grep -q 'https://cdn.shopify.com/shopifycloud/app-bridge.js' "$admin_body"
          grep -q 'name="shopify-api-key"' "$admin_body"

      - name: Revoke temporary runner SSH ingress
        if: ${{ always() && steps.ssh_ingress.outputs.authorized == 'true' }}
        run: |
          set -euo pipefail
          aws ec2 revoke-security-group-ingress --group-id "$EC2_SSH_SECURITY_GROUP_ID" --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.ssh_ingress.outputs.runner_cidr }}}]" || true
