name: CI

# Private GitHub Free strategy: validate changes here and deploy separately.
on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "apps/shopify-app/**"
      - "infra/**"
      - "package.json"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "apps/shopify-app/**"
      - "infra/**"
      - "package.json"
      - "scripts/**"

permissions:
  contents: read

concurrency:
  group: shopify-clever-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Build, test, and compose config
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/shopify-app/package-lock.json

      - name: Install app dependencies
        working-directory: apps/shopify-app
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build app
        run: npm run build

      - name: Typecheck app
        run: npm run typecheck

      - name: Test app
        run: npm test

      - name: Check public URL hostnames
        run: npm run check:public-urls

      - name: Prepare non-secret compose env files
        run: |
          cp infra/env/shopify-app.env.example infra/env/shopify-app.env
          cp infra/env/shopify-app-clever-route.env.example infra/env/shopify-app-clever-route.env
          cp infra/env/shopify-app-kfood.env.example infra/env/shopify-app-kfood.env

      - name: Validate Shopify app compose files
        run: |
          docker compose -f infra/compose/docker-compose.shopify-main.yml config --quiet
          docker compose -f infra/compose/docker-compose.shopify-dev.yml config --quiet
          docker compose -f infra/compose/docker-compose.shopify-kfood.yml config --quiet
