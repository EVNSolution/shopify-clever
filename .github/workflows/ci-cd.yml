name: CI/CD

# Private GitHub Free strategy:
# - keep CI automatic and lightweight because private GitHub-hosted runs consume the
#   org monthly Actions quota.
# - keep production deploy manual because deployment environments/protection rules
#   are not available for private repos on the current Free org plan.
on:
  pull_request:
    paths:
      - ".github/workflows/ci-cd.yml"
      - "apps/**"
      - "infra/**"
      - "package.json"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-cd.yml"
      - "apps/**"
      - "infra/**"
      - "package.json"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy the current main branch to the production EC2 host"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: shopify-clever-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Build, test, and compose config
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/shopify-app/package-lock.json
            apps/delivery-api/package-lock.json

      - name: Install app dependencies
        run: npm run setup

      - name: Build apps
        run: npm run build

      - name: Typecheck apps
        run: npm run typecheck

      - name: Test apps
        run: npm test

      - name: Check public URL hostnames
        run: npm run check:public-urls

      - name: Check Shopify submission readiness
        run: npm run check:shopify-submission

      - name: Prepare non-secret compose env files
        run: |
          cp infra/env/shopify-app.env.example infra/env/shopify-app.env
          cp infra/env/delivery-api.env.example infra/env/delivery-api.env

      - name: Validate compose file
        run: docker compose -f infra/compose/docker-compose.prod.yml config --quiet

  deploy:
    name: Deploy to EC2
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_production == true && github.ref == 'refs/heads/main' }}
    concurrency:
      group: shopify-clever-production
      cancel-in-progress: false

    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate deployment configuration
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$DEPLOY_PATH"
          test -n "$EC2_SSH_KEY"
          test -n "$AWS_REGION"
          test -n "$EC2_SECURITY_GROUP_ID"
          test -n "$AWS_ROLE_TO_ASSUME"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve runner public IPv4
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          if ! printf '%s' "$runner_ip" | grep -Eq '^[0-9]{1,3}(\.[0-9]{1,3}){3}$'; then
            echo "::error::Unable to resolve GitHub runner public IPv4: $runner_ip"
            exit 1
          fi
          echo "RUNNER_SSH_CIDR=${runner_ip}/32" >> "$GITHUB_ENV"
          echo "GitHub runner SSH CIDR: ${runner_ip}/32" >> "$GITHUB_STEP_SUMMARY"

      - name: Authorize temporary SSH ingress
        run: |
          set -euo pipefail
          echo "Authorizing SSH from ${RUNNER_SSH_CIDR} to ${EC2_SECURITY_GROUP_ID}"
          set +e
          output="$(aws ec2 authorize-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${RUNNER_SSH_CIDR},Description=GitHub Actions production deploy ${GITHUB_RUN_ID}}]" \
            --query 'SecurityGroupRules[0].SecurityGroupRuleId' \
            --output text 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            if printf '%s' "$output" | grep -q 'InvalidPermission.Duplicate'; then
              echo "SSH ingress already exists for ${RUNNER_SSH_CIDR}; leaving it unchanged."
              exit 0
            fi
            printf '%s\n' "$output"
            exit "$status"
          fi
          if [ -z "$output" ] || [ "$output" = "None" ]; then
            echo "::error::AWS did not return a security group rule id for temporary SSH ingress."
            exit 1
          fi
          echo "RUNNER_SSH_RULE_ID=$output" >> "$GITHUB_ENV"
          echo "Temporary SSH security group rule: $output" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for attempt in 1 2 3; do
            if ssh-keyscan -4 -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          echo "::error::Unable to reach SSH host $EC2_HOST:22 from the GitHub runner. Check the EC2 security group, NACL, and host firewall allow GitHub-hosted runner traffic."
          exit 1

      - name: Sync source to EC2
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'build/' \
            --exclude 'dist/' \
            --exclude '.react-router/' \
            --exclude '.shopify/' \
            --exclude '.omx/' \
            --exclude 'infra/env/*.env' \
            --exclude 'data/' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ "$EC2_USER@$EC2_HOST:$DEPLOY_PATH/"

      - name: Build and restart services on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            test -f infra/env/shopify-app.env
            test -f infra/env/delivery-api.env
            mkdir -p data/shopify
            touch data/shopify/dev.sqlite
            chmod 600 infra/env/*.env data/shopify/dev.sqlite
            docker compose -f infra/compose/docker-compose.prod.yml config --quiet
            docker compose -f infra/compose/docker-compose.prod.yml build
            docker compose -f infra/compose/docker-compose.prod.yml up -d
            docker compose -f infra/compose/docker-compose.prod.yml ps
          "

      - name: Smoke test public endpoints
        run: |
          curl -fsS https://clever-delivery.3-39-216-177.sslip.io/healthz
          test "$(curl -sS -o /dev/null -w '%{http_code}' https://clever-delivery.3-39-216-177.sslip.io/readyz)" = "200"
          admin_body="$(mktemp)"
          test "$(curl -sS -L -o "$admin_body" -w '%{http_code}' https://clever-admin.3-39-216-177.sslip.io/auth/login)" = "200"
          grep -q 'https://cdn.shopify.com/shopifycloud/app-bridge.js' "$admin_body"
          grep -q 'name="shopify-api-key"' "$admin_body"

      - name: Revoke temporary SSH ingress
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -z "${RUNNER_SSH_RULE_ID:-}" ] || [ -z "${AWS_REGION:-}" ]; then
            echo "No workflow-created SSH ingress rule id found; skipping revoke."
            exit 0
          fi
          echo "Revoking temporary SSH security group rule ${RUNNER_SSH_RULE_ID}"
          set +e
          output="$(aws ec2 revoke-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --security-group-rule-ids "$RUNNER_SSH_RULE_ID" 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            if printf '%s' "$output" | grep -Eq 'InvalidPermission.NotFound|InvalidSecurityGroupRuleId.NotFound'; then
              echo "Temporary SSH ingress rule was already absent."
            else
              printf '%s\n' "$output"
              exit "$status"
            fi
          fi
