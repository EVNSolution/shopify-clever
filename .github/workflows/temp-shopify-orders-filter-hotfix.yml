name: Temp Shopify orders filter hotfix

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch or ref containing the Shopify app runtime files to deploy
        required: true
        type: string

permissions:
  contents: read

jobs:
  hotfix:
    name: Patch Shopify app order filter behavior on EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      EC2_SSH_SECURITY_GROUP_ID: ${{ vars.EC2_SSH_SECURITY_GROUP_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "${{ inputs.source_ref }}"
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$DEPLOY_PATH"
          test -n "$EC2_SSH_KEY"
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$EC2_SSH_SECURITY_GROUP_ID"

      - name: Check out hotfix source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: source

      - name: Temporarily allow this runner to SSH to EC2
        id: ssh_ingress
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          runner_cidr="$runner_ip/32"
          echo "runner_cidr=$runner_cidr" >> "$GITHUB_OUTPUT"
          if aws ec2 authorize-security-group-ingress --group-id "$EC2_SSH_SECURITY_GROUP_ID" --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$runner_cidr,Description=shopify-orders-filter-hotfix}]"; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for attempt in 1 2 3; do
            if ssh-keyscan -4 -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          exit 1

      - name: Patch Shopify app filters and restart service
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            source/apps/shopify-app/app/features/orders/order-filters.js \
            source/apps/shopify-app/app/routes/app.orders.jsx \
            "$EC2_USER@$EC2_HOST:/tmp/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" 'bash -s' -- "$DEPLOY_PATH" <<'REMOTE'
          set -euo pipefail
          cd "$1"
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          cp apps/shopify-app/app/features/orders/order-filters.js "/tmp/order-filters.js.before-$ts"
          cp apps/shopify-app/app/routes/app.orders.jsx "/tmp/app.orders.jsx.before-$ts"
          install -m 644 /tmp/order-filters.js apps/shopify-app/app/features/orders/order-filters.js
          install -m 644 /tmp/app.orders.jsx apps/shopify-app/app/routes/app.orders.jsx
          grep -q 'isOrderDeliveryDatePast(order, referenceDate)' apps/shopify-app/app/features/orders/order-filters.js
          grep -q 'planned: params.has(plannedQueryKey) ? params.get(plannedQueryKey) : "false"' apps/shopify-app/app/features/orders/order-filters.js
          grep -q 'orderFilterReferenceDate' apps/shopify-app/app/routes/app.orders.jsx
          grep -q 'activeOrderFilterButtonStyle' apps/shopify-app/app/routes/app.orders.jsx
          grep -q 'handleToggleAllOrders' apps/shopify-app/app/routes/app.orders.jsx
          docker compose -f infra/compose/docker-compose.prod.yml build shopify-app
          docker compose -f infra/compose/docker-compose.prod.yml up -d shopify-app
          docker compose -f infra/compose/docker-compose.prod.yml ps shopify-app
          rm -f /tmp/order-filters.js /tmp/app.orders.jsx
          REMOTE

      - name: Smoke test production app endpoint
        run: |
          set -euo pipefail
          admin_body="$(mktemp)"
          code=""
          for attempt in 1 2 3 4 5; do
            code="$(curl -sS -L -o "$admin_body" -w '%{http_code}' https://clever-admin.3-39-216-177.sslip.io/auth/login || true)"
            if [ "$code" = "200" ] && grep -q 'https://cdn.shopify.com/shopifycloud/app-bridge.js' "$admin_body" && grep -q 'name="shopify-api-key"' "$admin_body"; then
              exit 0
            fi
            sleep "$((attempt * 3))"
          done
          echo "unexpected smoke status=$code" >&2
          tail -c 500 "$admin_body" >&2 || true
          exit 1

      - name: Revoke temporary runner SSH ingress
        if: ${{ always() && steps.ssh_ingress.outputs.authorized == 'true' }}
        run: |
          set -euo pipefail
          aws ec2 revoke-security-group-ingress --group-id "$EC2_SSH_SECURITY_GROUP_ID" --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.ssh_ingress.outputs.runner_cidr }}}]" || true
