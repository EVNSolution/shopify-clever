name: Temporary Shopify drivers app-access relogin hotfix

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch/ref containing the patched Drivers route file
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_SSH_SECURITY_GROUP_ID: ${{ vars.EC2_SSH_SECURITY_GROUP_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout patched source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: source

      - name: Validate required deploy env
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$DEPLOY_PATH"
          test -n "$EC2_SSH_KEY"

      - name: Authorize runner SSH ingress
        id: ingress
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' && env.EC2_SSH_SECURITY_GROUP_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n')"
          echo "runner_ip=$runner_ip" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SSH_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$runner_ip/32,Description=github-actions-temp-drivers-relogin}]" || true

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -4 -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy patched Drivers route and restart Shopify app
        shell: bash
        run: |
          set -euo pipefail
          test -f source/apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          grep -q 'canShowDriverReloginAction' source/apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          grep -q '재로그인' source/apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          scp -i ~/.ssh/deploy_key source/apps/shopify-app/app/routes/app.drivers-vehicles.jsx "$EC2_USER@$EC2_HOST:/tmp/app.drivers-vehicles.jsx"
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          cp apps/shopify-app/app/routes/app.drivers-vehicles.jsx "/tmp/app.drivers-vehicles.jsx.before-$ts"
          install -m 644 /tmp/app.drivers-vehicles.jsx apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          grep -q 'canShowDriverReloginAction' apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          grep -q '재로그인' apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          grep -q 'canShowDriverInviteActions(driver)' apps/shopify-app/app/routes/app.drivers-vehicles.jsx
          docker compose -f infra/compose/docker-compose.prod.yml build shopify-app
          docker compose -f infra/compose/docker-compose.prod.yml up -d shopify-app
          docker compose -f infra/compose/docker-compose.prod.yml ps shopify-app
          rm -f /tmp/app.drivers-vehicles.jsx
          REMOTE

      - name: Smoke check Shopify app auth entry
        shell: bash
        run: |
          set -euo pipefail
          body="$(curl -fsSL https://clever-admin.3-39-216-177.sslip.io/auth/login)"
          grep -q 'shopify-api-key' <<<"$body"
          grep -qi 'app-bridge' <<<"$body"

      - name: Revoke runner SSH ingress
        if: always() && steps.ingress.outputs.runner_ip != ''
        shell: bash
        run: |
          set +e
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SSH_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ingress.outputs.runner_ip }}/32"
