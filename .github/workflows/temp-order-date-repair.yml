name: Temporary order date repair

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: temporary-order-date-repair
  cancel-in-progress: false

jobs:
  repair:
    name: Repair production order delivery dates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      EC2_SSH_SECURITY_GROUP_ID: ${{ vars.EC2_SSH_SECURITY_GROUP_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Validate repair configuration
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$DEPLOY_PATH"
          test -n "$EC2_SSH_KEY"
          test -n "$EC2_SSH_SECURITY_GROUP_ID"
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"

      - name: Temporarily allow this runner to SSH to EC2
        id: ssh_ingress
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          runner_cidr="$runner_ip/32"
          echo "runner_cidr=$runner_cidr" >> "$GITHUB_OUTPUT"
          if aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SSH_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=$runner_cidr,Description=shopify-clever-order-date-repair}]"; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            if aws ec2 describe-security-groups \
              --group-ids "$EC2_SSH_SECURITY_GROUP_ID" \
              --query "SecurityGroups[0].IpPermissions[?FromPort==\`22\` && ToPort==\`22\`].IpRanges[].CidrIp" \
              --output text | tr '\t' '\n' | grep -Fxq "$runner_cidr"; then
              echo "authorized=false" >> "$GITHUB_OUTPUT"
            else
              exit 1
            fi
          fi

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for attempt in 1 2 3; do
            if ssh-keyscan -4 -T 20 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          exit 1

      - name: Repair order delivery dates from Shopify attributes
        run: |
          set -euo pipefail
          cat > /tmp/order-date-repair.sql <<'SQL'
          \set ON_ERROR_STOP on
          BEGIN;
          CREATE TEMP TABLE order_date_repair_map (
            name text PRIMARY KEY,
            delivery_date date NOT NULL,
            delivery_area text NOT NULL,
            delivery_day_raw text NOT NULL,
            delivery_weekday text NOT NULL
          );
          INSERT INTO order_date_repair_map (name, delivery_date, delivery_area, delivery_day_raw, delivery_weekday) VALUES
          ('#1196','2026-05-31','Oakville','Sunday','SUNDAY'),
          ('#1195','2026-05-31','Etobicoke','Sunday','SUNDAY'),
          ('#1194','2026-05-31','Etobicoke','Sunday','SUNDAY'),
          ('#1193','2026-05-30','Mississauga','Saturday','SATURDAY'),
          ('#1192','2026-05-30','Mississauga','Saturday','SATURDAY'),
          ('#1191','2026-05-30','Downtown','Saturday','SATURDAY'),
          ('#1190','2026-05-30','Downtown','Saturday','SATURDAY'),
          ('#1189','2026-05-29','Scarborough','Friday','FRIDAY'),
          ('#1188','2026-05-29','Scarborough','Friday','FRIDAY'),
          ('#1187','2026-05-29','Vaughan','Friday','FRIDAY'),
          ('#1186','2026-05-28','Vaughan','Thursday','THURSDAY'),
          ('#1185','2026-05-28','Richmond Hill','Thursday','THURSDAY'),
          ('#1184','2026-05-28','Richmond Hill','Thursday','THURSDAY'),
          ('#1183','2026-05-28','Markham','Thursday','THURSDAY'),
          ('#1182','2026-05-27','Markham','Wednesday','WEDNESDAY'),
          ('#1181','2026-05-27','Thornhill','Wednesday','WEDNESDAY'),
          ('#1180','2026-05-27','Thornhill','Wednesday','WEDNESDAY'),
          ('#1179','2026-05-26','North York','Tuesday','TUESDAY'),
          ('#1178','2026-05-26','North York','Tuesday','TUESDAY'),
          ('#1177','2026-05-26','York','Tuesday','TUESDAY'),
          ('#1176','2026-05-26','York','Tuesday','TUESDAY'),
          ('#1175','2026-05-25','Toronto Midtown','Monday','MONDAY'),
          ('#1174','2026-05-25','Toronto Midtown','Monday','MONDAY'),
          ('#1173','2026-05-25','Pickering','Monday','MONDAY'),
          ('#1172','2026-05-24','Pickering','Sunday','SUNDAY'),
          ('#1171','2026-05-24','Ajax','Sunday','SUNDAY'),
          ('#1170','2026-05-24','Ajax','Sunday','SUNDAY'),
          ('#1169','2026-05-24','Brampton','Sunday','SUNDAY'),
          ('#1168','2026-05-23','Brampton','Saturday','SATURDAY'),
          ('#1167','2026-05-23','Oakville','Saturday','SATURDAY'),
          ('#1166','2026-05-23','Oakville','Saturday','SATURDAY'),
          ('#1165','2026-05-22','Etobicoke','Friday','FRIDAY'),
          ('#1164','2026-05-22','Etobicoke','Friday','FRIDAY'),
          ('#1163','2026-05-22','Mississauga','Friday','FRIDAY'),
          ('#1162','2026-05-22','Mississauga','Friday','FRIDAY'),
          ('#1161','2026-05-21','Downtown','Thursday','THURSDAY'),
          ('#1160','2026-05-21','Downtown','Thursday','THURSDAY'),
          ('#1159','2026-05-21','Scarborough','Thursday','THURSDAY'),
          ('#1158','2026-05-20','Scarborough','Wednesday','WEDNESDAY'),
          ('#1157','2026-05-20','Vaughan','Wednesday','WEDNESDAY'),
          ('#1156','2026-05-20','Vaughan','Wednesday','WEDNESDAY'),
          ('#1155','2026-05-20','Richmond Hill','Wednesday','WEDNESDAY'),
          ('#1154','2026-05-19','Richmond Hill','Tuesday','TUESDAY'),
          ('#1153','2026-05-19','Markham','Tuesday','TUESDAY'),
          ('#1152','2026-05-19','Markham','Tuesday','TUESDAY'),
          ('#1151','2026-05-18','Thornhill','Monday','MONDAY'),
          ('#1150','2026-05-18','Thornhill','Monday','MONDAY'),
          ('#1149','2026-05-18','North York','Monday','MONDAY'),
          ('#1148','2026-05-18','North York','Monday','MONDAY')
          ;
          
          CREATE TEMP TABLE order_date_repair_target AS
          SELECT
            o.id,
            o."shopId",
            o.name,
            m.delivery_date,
            m.delivery_area,
            m.delivery_day_raw,
            m.delivery_weekday
          FROM orders o
          JOIN shops s ON s.id = o."shopId"
          JOIN order_date_repair_map m ON m.name = o.name
          WHERE s."shopDomain" = 'clever-store-test-ij1v0anx.myshopify.com';
          
          SELECT 'matched_orders' AS metric, count(*)::text AS value FROM order_date_repair_target;
          SELECT 'before_missing_delivery_date' AS metric, count(*)::text AS value
          FROM order_date_repair_target t
          JOIN orders o ON o.id = t.id
          WHERE o."rawPayload"->>'deliveryDate' IS NULL OR o."rawPayload"->>'deliveryDate' = '';
          
          WITH patched_stops AS (
            UPDATE delivery_stops ds
            SET
              "deliveryDate" = t.delivery_date,
              "updatedAt" = now()
            FROM order_date_repair_target t
            WHERE ds."orderId" = t.id
              AND ds."shopId" = t."shopId"
            RETURNING ds.id
          )
          SELECT 'delivery_stops_patched' AS metric, count(*)::text AS value FROM patched_stops;
          
          WITH patched_orders AS (
            UPDATE orders o
            SET
              "rawPayload" = jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                jsonb_set(
                  COALESCE(o."rawPayload"::jsonb, '{}'::jsonb),
                  '{deliveryDate}', to_jsonb(t.delivery_date::text), true),
                  '{deliveryDateRaw}', to_jsonb(t.delivery_date::text), true),
                  '{deliveryDateSource}', to_jsonb('EXPLICIT_ATTRIBUTE'::text), true),
                  '{deliveryBatchStartDate}', to_jsonb(t.delivery_date::text), true),
                  '{deliveryBatchEndDate}', to_jsonb(t.delivery_date::text), true),
                  '{deliveryDayRaw}', to_jsonb(t.delivery_day_raw), true),
                  '{deliveryWeekday}', to_jsonb(t.delivery_weekday), true),
                  '{deliverySession}', to_jsonb('DAY'::text), true),
                  '{serviceType}', to_jsonb('DELIVERY'::text), true),
                  '{routeScopeKey}', to_jsonb((t.delivery_date::text || '|DELIVERY||')::text), true),
                  '{planningGroupKey}', to_jsonb((t.delivery_date::text || '|DELIVERY|||' || t.delivery_area)::text), true),
                  '{readiness}', to_jsonb('READY_TO_PLAN'::text), true),
                  '{reviewReasons}', '[]'::jsonb, true),
              "updatedAtShopify" = CASE
                WHEN o."updatedAtShopify" IS NULL OR o."updatedAtShopify" < now() THEN now()
                ELSE o."updatedAtShopify"
              END,
              "updatedAt" = now()
            FROM order_date_repair_target t
            WHERE o.id = t.id
            RETURNING o.name, o."rawPayload"->>'deliveryDate' AS delivery_date
          )
          SELECT 'orders_patched' AS metric, count(*)::text AS value FROM patched_orders;
          
          SELECT o.name, o."rawPayload"->>'deliveryDate' AS delivery_date, o."rawPayload"->>'readiness' AS readiness
          FROM orders o
          JOIN order_date_repair_target t ON t.id = o.id
          ORDER BY o.name DESC
          LIMIT 10;
          COMMIT;
          SQL
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes /tmp/order-date-repair.sql "$EC2_USER@$EC2_HOST:/tmp/order-date-repair.sql"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            backup=\"/backups/order-date-repair-\$(date -u +%Y%m%dT%H%M%SZ).dump\"
            docker compose -f infra/compose/docker-compose.prod.yml exec -T postgres sh -lc 'pg_dump --format=custom --no-owner --no-acl -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -f \"\$1\"' sh \"\$backup\"
            echo \"backup=\$backup\"
            docker compose -f infra/compose/docker-compose.prod.yml exec -T postgres sh -lc 'cat > /tmp/order-date-repair.sql' < /tmp/order-date-repair.sql
            docker compose -f infra/compose/docker-compose.prod.yml exec -T postgres sh -lc 'psql -v ON_ERROR_STOP=1 -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -f /tmp/order-date-repair.sql'
            rm -f /tmp/order-date-repair.sql
          "

      - name: Revoke temporary runner SSH ingress
        if: ${{ always() && steps.ssh_ingress.outputs.runner_cidr != '' && steps.ssh_ingress.outputs.authorized == 'true' }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SSH_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.ssh_ingress.outputs.runner_cidr }}}]" || true
