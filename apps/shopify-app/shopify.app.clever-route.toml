# Shopify app configuration for the clever-route custom distribution app.
# This file is safe to commit: it contains the custom app client ID, not the API secret.

client_id = "9be6895e1de376bf056787803e863a4d"
name = "clever-route"
application_url = "https://clever-test-admin.3-39-216-177.sslip.io"
embedded = true

[access_scopes]
# Keep custom-store testing to the same minimum read-only scopes as the public app.
scopes = "read_orders,read_locations"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]

[auth]
redirect_urls = [ "https://clever-test-admin.3-39-216-177.sslip.io/auth/callback" ]

[build]
automatically_update_urls_on_dev = true
