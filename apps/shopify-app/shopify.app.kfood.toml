# Shopify app configuration for the KFood custom-store app.
# This file is safe to commit: it contains the KFood app client ID, not the API secret.

client_id = "0f23bdf915ecb9f0f40383c13f8fa3e1"
name = "CLEVER K-Food"
handle = "clever-route-kfood"
application_url = "https://clever-kfood-app.cleversystem.ai"
embedded = true

[access_scopes]
# Keep KFood testing to the same minimum read-only scopes as the public/dev apps.
scopes = "read_orders,read_locations"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]

[auth]
redirect_urls = [ "https://clever-kfood-app.cleversystem.ai/auth/callback" ]

[build]
automatically_update_urls_on_dev = false
