# Shopify app configuration for the dev/custom-store app.
# This file is safe to commit: it contains the dev app client ID, not the API secret.

client_id = "9be6895e1de376bf056787803e863a4d"
name = "CleverRoute Dev"
handle = "clever-route-dev"
application_url = "https://clever-route-app-dev.cleversystem.ai"
embedded = true

[access_scopes]
# Keep dev/custom-store testing to the same minimum read-only scopes as the public app.
scopes = "read_orders,read_locations,read_customers"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders"
  topics = [
    "orders/create",
    "orders/updated",
    "orders/edited",
    "orders/cancelled",
    "orders/delete",
    "orders/fulfilled",
    "orders/partially_fulfilled"
  ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]

[auth]
redirect_urls = [ "https://clever-route-app-dev.cleversystem.ai/auth/callback" ]

[build]
automatically_update_urls_on_dev = true
