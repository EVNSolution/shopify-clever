# Shopify app configuration

client_id = "6994f8bd771cebdac03a800f20e1de86"
name = "CLEVER"
handle = "clever-route"
application_url = "https://clever-admin.cleversystem.ai"
embedded = true

[access_scopes]
# Required Admin API access scopes
scopes = "read_orders,read_locations"


[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders"
  topics = [
    "orders/create",
    "orders/updated",
    "orders/edited",
    "orders/cancelled",
    "orders/delete",
    "orders/fulfilled",
    "orders/partially_fulfilled"
  ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]

[auth]
redirect_urls = [ "https://clever-admin.cleversystem.ai/auth/callback" ]

[build]
automatically_update_urls_on_dev = false
