openapi: 3.1.0
info:
  title: CLEVER Delivery Server API
  version: 0.1.0
  license:
    name: UNLICENSED
    identifier: LicenseRef-UNLICENSED
  summary: Shopify companion delivery data server HTTP contract
  description: >-
    Machine-readable contract for server communication with Shopify embedded
    apps, Shopify HTTPS webhooks, native driver mobile clients, and operational
    health checks. Human behavior notes live beside this file in docs/api/*.md.
  x-contract-revision: 2026-05-14
  x-source-repository: EVNSolution/clever-delivery-server
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://{deliveryServerHost}
    description: Deployed delivery server
    variables:
      deliveryServerHost:
        default: delivery.example.com
security: []
tags:
  - name: API Documentation
    description: Browser-accessible Swagger UI and raw OpenAPI document
  - name: Health
    description: Operational readiness and liveness probes
  - name: Shopify Embedded Admin
    description: Shopify embedded/admin app calls protected by Shopify session tokens
  - name: Shopify Webhooks
    description: Shopify HTTPS webhook ingress protected by HMAC headers
  - name: Driver Mobile
    description: Native driver app API calls
paths:
  /docs:
    get:
      tags: [API Documentation]
      summary: Browser Swagger UI for this service contract
      operationId: getApiDocsUi
      x-source-file: src/routes/api-docs.routes.ts
      responses:
        '200':
          description: Swagger UI HTML that loads same-origin Swagger UI assets and `/docs/openapi.yaml`.
          content:
            text/html:
              schema:
                type: string
  /docs/swagger-ui/swagger-ui.css:
    get:
      tags: [API Documentation]
      summary: Same-origin Swagger UI stylesheet asset
      operationId: getSwaggerUiStylesheet
      x-source-file: src/routes/api-docs.routes.ts
      responses:
        '200':
          description: Swagger UI stylesheet served by the API server so `/docs` does not depend on a public CDN.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Public immutable cache directive for versioned container assets.
          content:
            text/css:
              schema:
                type: string
  /docs/swagger-ui/swagger-ui-bundle.js:
    get:
      tags: [API Documentation]
      summary: Same-origin Swagger UI JavaScript bundle asset
      operationId: getSwaggerUiBundle
      x-source-file: src/routes/api-docs.routes.ts
      responses:
        '200':
          description: Swagger UI JavaScript bundle served by the API server so `/docs` does not depend on a public CDN.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Public immutable cache directive for versioned container assets.
          content:
            application/javascript:
              schema:
                type: string
  /docs/swagger-ui/init.js:
    get:
      tags: [API Documentation]
      summary: Same-origin Swagger UI initialization script
      operationId: getSwaggerUiInitScript
      x-source-file: src/routes/api-docs.routes.ts
      responses:
        '200':
          description: Small initialization script for the interactive Swagger UI. Served externally so the `/docs` CSP does not require inline scripts.
          content:
            application/javascript:
              schema:
                type: string
  /docs/openapi.yaml:
    get:
      tags: [API Documentation]
      summary: Raw OpenAPI YAML document for this service
      operationId: getOpenApiYaml
      x-source-file: src/routes/api-docs.routes.ts
      responses:
        '200':
          description: OpenAPI YAML contract.
          content:
            application/yaml:
              schema:
                type: string
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getHealthz
      x-source-file: src/routes/health.routes.ts
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                ok:
                  value:
                    service: clever-delivery-server
                    status: ok
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getReadyz
      x-source-file: src/routes/health.routes.ts
      responses:
        '200':
          description: Service is ready for the current HTTP scaffold.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /shopify/auth/token-exchange:
    post:
      tags: [Shopify Embedded Admin]
      summary: Exchange a Shopify session token and store Admin API token metadata
      operationId: exchangeShopifySessionToken
      x-source-file: src/routes/shopify-auth.routes.ts
      security:
        - ShopifySessionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopifyTokenExchangeRequest'
            examples:
              expectedShop:
                value:
                  shopDomain: example.myshopify.com
      responses:
        '200':
          description: Token material was exchanged and stored without exposing plaintext tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopifyTokenExchangeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          description: Shopify token exchange or token persistence failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                exchangeFailed:
                  value:
                    data: null
                    error:
                      code: SHOPIFY_TOKEN_EXCHANGE_FAILED
                      message: Shopify token exchange failed
  /shopify/webhooks:
    post:
      tags: [Shopify Webhooks]
      summary: Receive and idempotently record a Shopify webhook
      operationId: receiveShopifyWebhook
      x-source-file: src/routes/shopify-webhook.routes.ts
      security:
        - ShopifyWebhookHmac: []
      parameters:
        - $ref: '#/components/parameters/ShopifyTopicHeader'
        - $ref: '#/components/parameters/ShopifyShopDomainHeader'
        - $ref: '#/components/parameters/ShopifyWebhookIdHeader'
        - $ref: '#/components/parameters/ShopifyApiVersionHeader'
        - $ref: '#/components/parameters/ShopifyEventIdHeader'
        - $ref: '#/components/parameters/ShopifyTriggeredAtHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Duplicate webhook receipt was already recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopifyWebhookEnvelope'
        '202':
          description: New webhook receipt was accepted for storage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopifyWebhookEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/orders/sync:
    patch:
      tags: [Shopify Embedded Admin]
      summary: Sync an embedded-admin Shopify order snapshot into canonical orders
      operationId: syncAdminOrders
      x-source-file: src/routes/admin-orders.routes.ts
      security:
        - ShopifySessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminOrdersSyncRequest'
      responses:
        '200':
          description: Snapshot processed and canonical rows returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrdersSyncEnvelope'
        '400':
          description: Invalid order sync payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidPayload:
                  value:
                    data: null
                    error:
                      code: INVALID_ORDER_SYNC_PAYLOAD
                      message: Invalid order sync payload
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/orders:
    get:
      tags: [Shopify Embedded Admin]
      summary: List canonical orders for the authenticated shop
      operationId: listAdminOrders
      x-source-file: src/routes/admin-orders.routes.ts
      security:
        - ShopifySessionToken: []
      parameters:
        - name: readiness
          in: query
          schema:
            $ref: '#/components/schemas/CanonicalOrderReadiness'
        - name: planned
          in: query
          schema:
            type: boolean
        - name: deliveryWeekday
          in: query
          schema:
            enum: [THURSDAY, FRIDAY, SATURDAY]
            type: string
        - name: serviceType
          in: query
          schema:
            $ref: '#/components/schemas/DeliveryServiceType'
        - name: geocodeStatus
          in: query
          schema:
            enum: [PENDING, RESOLVED, FAILED, NOT_REQUIRED]
            type: string
        - name: deliveryDate
          in: query
          schema:
            format: date
            type: string
        - name: deliveryBatchStartDate
          in: query
          schema:
            format: date
            type: string
        - name: deliveryBatchEndDate
          in: query
          schema:
            format: date
            type: string
        - name: deliverySession
          in: query
          schema:
            enum: [DAY, EVENING, PICKUP]
            type: string
        - name: routeScopeKey
          in: query
          schema:
            type: string
        - name: planningGroupKey
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Canonical orders for the authenticated shop.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrdersListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/drivers:
    get:
      tags: [Shopify Embedded Admin]
      summary: List drivers for the authenticated shop
      operationId: listAdminDrivers
      x-source-file: src/routes/admin-drivers.routes.ts
      security:
        - ShopifySessionToken: []
      responses:
        '200':
          description: Drivers for the authenticated shop.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDriversListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shopify Embedded Admin]
      summary: Create a pending driver for the authenticated shop
      operationId: createAdminDriver
      x-source-file: src/routes/admin-drivers.routes.ts
      security:
        - ShopifySessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDriverCreateRequest'
      responses:
        '201':
          description: Driver was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDriverEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/route-plans:
    get:
      tags: [Shopify Embedded Admin]
      summary: List route plans for the authenticated shop
      operationId: listAdminRoutePlans
      x-source-file: src/routes/admin-route-plans.routes.ts
      security:
        - ShopifySessionToken: []
      responses:
        '200':
          description: Route plans for the authenticated shop.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePlansListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Shopify Embedded Admin]
      summary: Create a draft route plan from selected Shopify orders
      operationId: createAdminRoutePlan
      x-source-file: src/routes/admin-route-plans.routes.ts
      security:
        - ShopifySessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoutePlanRequest'
      responses:
        '201':
          description: Draft route plan created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePlanEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /admin/route-plans/{routePlanId}:
    parameters:
      - $ref: '#/components/parameters/RoutePlanId'
    get:
      tags: [Shopify Embedded Admin]
      summary: Read a route plan detail for the authenticated shop
      operationId: getAdminRoutePlan
      x-source-file: src/routes/admin-route-plans.routes.ts
      security:
        - ShopifySessionToken: []
      responses:
        '200':
          description: Route plan detail, stops, and optional geometry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePlanDetailEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Shopify Embedded Admin]
      summary: Delete a route plan for the authenticated shop
      operationId: deleteAdminRoutePlan
      x-source-file: src/routes/admin-route-plans.routes.ts
      security:
        - ShopifySessionToken: []
      responses:
        '200':
          description: Route plan deletion result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/route-plans/{routePlanId}/stops:
    parameters:
      - $ref: '#/components/parameters/RoutePlanId'
    patch:
      tags: [Shopify Embedded Admin]
      summary: Replace ordered stops for a route plan
      operationId: updateAdminRoutePlanStops
      x-source-file: src/routes/admin-route-plans.routes.ts
      security:
        - ShopifySessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoutePlanStopsRequest'
      responses:
        '200':
          description: Updated route plan detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePlanDetailEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /driver/route-access/lookup:
    post:
      tags: [Driver Mobile]
      summary: Phone-first route access lookup for the driver app
      operationId: lookupDriverRouteAccess
      x-source-file: src/routes/driver-events.routes.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverRouteAccessLookupRequest'
      responses:
        '200':
          description: Safe route-access result. Denials use HTTP 200 with status in data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverRouteAccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /driver/assigned-route:
    get:
      tags: [Driver Mobile]
      summary: Read the assigned route for the bearer-token driver
      operationId: getDriverAssignedRoute
      x-source-file: src/routes/driver-events.routes.ts
      security:
        - DriverAccessToken: []
      parameters:
        - name: routeContext
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Assigned route details or a safe empty status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverAssignedRouteEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /driver/consents:
    post:
      tags: [Driver Mobile]
      summary: Record required driver consent evidence
      operationId: recordDriverConsents
      x-source-file: src/routes/driver-events.routes.ts
      security:
        - DriverAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverConsentRequest'
      responses:
        '201':
          description: Consent evidence recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverConsentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /driver/proof-media/{mediaId}/access:
    get:
      tags: [Driver Mobile]
      summary: Create short-lived read access for driver proof media
      operationId: getDriverProofMediaAccess
      x-source-file: src/routes/driver-events.routes.ts
      security:
        - DriverAccessToken: []
      parameters:
        - $ref: '#/components/parameters/MediaId'
      responses:
        '200':
          description: Short-lived proof media read access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverProofMediaAccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          description: Proof-media read access is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                unavailable:
                  value:
                    data: null
                    error:
                      code: PROOF_MEDIA_ACCESS_UNAVAILABLE
                      message: Proof media access is not configured
  /driver/proof-media:
    post:
      tags: [Driver Mobile]
      summary: Upload proof-of-delivery media
      operationId: uploadDriverProofMedia
      x-source-file: src/routes/driver-events.routes.ts
      security:
        - DriverAccessToken: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DriverProofMediaUploadRequest'
      responses:
        '201':
          description: Proof media metadata was persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverProofMediaEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Proof media was rejected by safety scan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                rejected:
                  value:
                    data: null
                    error:
                      code: PROOF_MEDIA_REJECTED
                      message: Proof media rejected by safety scan
  /driver/events:
    post:
      tags: [Driver Mobile]
      summary: Record an idempotent driver event
      operationId: recordDriverEvent
      x-source-file: src/routes/driver-events.routes.ts
      security:
        - DriverAccessToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverEventRequest'
      responses:
        '200':
          description: Duplicate event already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverEventEnvelope'
        '202':
          description: Event was accepted and recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverEventEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    ShopifySessionToken:
      type: http
      scheme: bearer
      bearerFormat: Shopify App Bridge session JWT
      description: Server-verified Shopify embedded app session token.
    DriverAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Server-issued short-lived driver JWT with audience clever-delivery-driver.
    ShopifyWebhookHmac:
      type: apiKey
      in: header
      name: X-Shopify-Hmac-Sha256
      description: Base64 HMAC generated by Shopify over the raw request body.
  parameters:
    RoutePlanId:
      name: routePlanId
      in: path
      required: true
      schema:
        type: string
    MediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
    ShopifyTopicHeader:
      name: X-Shopify-Topic
      in: header
      required: true
      schema:
        type: string
      example: orders/create
    ShopifyShopDomainHeader:
      name: X-Shopify-Shop-Domain
      in: header
      required: true
      schema:
        pattern: '^[a-z0-9][a-z0-9-]*\.myshopify\.com$'
        type: string
      example: example.myshopify.com
    ShopifyWebhookIdHeader:
      name: X-Shopify-Webhook-Id
      in: header
      required: true
      schema:
        type: string
    ShopifyApiVersionHeader:
      name: X-Shopify-API-Version
      in: header
      required: false
      schema:
        type: string
      example: 2026-04
    ShopifyEventIdHeader:
      name: X-Shopify-Event-Id
      in: header
      required: false
      schema:
        type: string
    ShopifyTriggeredAtHeader:
      name: X-Shopify-Triggered-At
      in: header
      required: false
      schema:
        format: date-time
        type: string
  responses:
    BadRequest:
      description: Invalid request payload, query, path, or headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token or HMAC.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated caller is outside the requested shop/driver/route scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested resource was not found under the authenticated boundary.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Request conflicts with existing route/order assignment state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
      additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/Error'
    GenericDataEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: object
          additionalProperties: true
        error:
          type: 'null'
    HealthResponse:
      type: object
      required: [service, status]
      properties:
        service:
          const: clever-delivery-server
        status:
          const: ok
    ReadyResponse:
      type: object
      required: [checks, service, status]
      properties:
        checks:
          type: object
          required: [http]
          properties:
            http:
              type: boolean
        service:
          const: clever-delivery-server
        status:
          const: ready
    ShopifyTokenExchangeRequest:
      type: object
      properties:
        shopDomain:
          type: string
          minLength: 1
          description: Optional expected-shop guard for session token verification.
      additionalProperties: false
    ShopifyTokenExchangeEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: object
          required: [shopDomain, tokenScopes, tokenStored]
          properties:
            shopDomain:
              type: string
            tokenScopes:
              type: array
              items:
                type: string
            tokenStored:
              const: true
        error:
          type: 'null'
    ShopifyWebhookEnvelope:
      type: object
      required: [data, error]
      properties:
        data:
          type: object
          required: [duplicate, webhookId]
          properties:
            duplicate:
              type: boolean
            webhookId:
              type: string
        error:
          type: 'null'
    AdminOrdersSyncRequest:
      type: object
      required: [source, reason, orders]
      properties:
        source:
          const: clever-app-orders
        reason:
          enum: [orders_page_open, manual_refresh, route_create_preflight]
          type: string
        orders:
          type: array
          items:
            $ref: '#/components/schemas/ShopifyOrderNode'
      additionalProperties: false
    ShopifyOrderNode:
      type: object
      required: [id, legacyResourceId, name, updatedAt]
      properties:
        id:
          type: string
          example: gid://shopify/Order/123
        legacyResourceId:
          type: string
        name:
          type: string
          example: '#1001'
        updatedAt:
          format: date-time
          type: string
        createdAt:
          format: date-time
          type:
            - string
            - 'null'
        processedAt:
          format: date-time
          type:
            - string
            - 'null'
        cancelledAt:
          format: date-time
          type:
            - string
            - 'null'
        currentTotalPriceSet:
          type:
            - object
            - 'null'
          additionalProperties: true
        customAttributes:
          type:
            - array
            - 'null'
          items:
