services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  api:
    ports: !reset []

  postgres:
    ports: !reset []
    volumes:
      - /mnt/clever-delivery-postgres/data:/var/lib/postgresql/data
      - /mnt/clever-delivery-postgres/backups:/backups

volumes:
  caddy-data:
  caddy-config:
